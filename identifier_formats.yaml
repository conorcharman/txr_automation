        regex: "^\\d{6}[+\\-A]\\d{3}[0-9A-Y]$"
        conditions:
          - "Total length: 11 characters"
          - "Positions 1-2: Day of birth (DD)"
          - "Positions 3-4: Month of birth (MM)"
          - "Positions 5-6: Year of birth (YY)"
          - "Position 7 (C): Century sign - '+' for 1800-1899, '-' for 1900-1999, 'A' for 2000-2099"
          - "Positions 8-10: Individual number (ZZZ) - odd for males, even for females, range 002-899"
          - "Position 11 (Q): Control character (checksum), excludes D, E, F"
          - "Example: 311280-888Y"
      - type: "CONCAT"
        format: "CC + YYYYMMDD + NNNNN + SSSSS (20 characters total)"
        regex: "^[A-Z]{2}\d{8}[A-Z#]{5}[A-Z#]{5}$"
        conditions:
          - "Positions 1-2: Two-letter country code"
