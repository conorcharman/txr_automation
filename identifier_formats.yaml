        format: "10 characters: 2 letters + 8 numeric digits"
        regex: "^[A-Z]{2}\\d{8}$"
        conditions:
          - "Total length: 10 characters"
          - "Positions 1-2: Two letters"
          - "Positions 3-10: Eight numeric digits"
          - "Example: ID022143586"
          - "Number changes with each renewed ID card"
      - type: "CONCAT"
        format: "CC + YYYYMMDD + NNNNN + SSSSS (20 characters total)"
        regex: "^[A-Z]{2}\d{8}[A-Z#]{5}[A-Z#]{5}$"
        conditions:
