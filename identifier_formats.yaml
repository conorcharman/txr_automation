        format: "16 alphanumeric characters: LLLLLLDDMMYYYYLLLLL"
        regex: "^[A-Z]{6}\\d{2}[A-Z]\\d{2}[A-Z]\\d{3}[A-Z]$"
        conditions:
          - "Total length: 16 characters"
          - "Positions 1-3: Last name (3 letters)"
          - "Positions 4-6: First name (3 letters)"
          - "Positions 7-8: Year of birth (2 digits)"
          - "Position 9: Month of birth (1 letter)"
          - "Positions 10-11: Day of birth (2 digits)"
          - "Positions 12-14: Place of birth (3 characters: 1 letter + 2 digits or 3 digits)"
          - "Positions 15-16: Sequential identifier + control character (1 letter + 1 digit or 1 digit + 1 letter)"
