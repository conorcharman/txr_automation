        format: "11 numeric digits"
        regex: "^\\d{11}$"
        conditions:
          - "Total length: 11 digits"
          - "First 10 digits: Chosen randomly, no information related to holder"
          - "Digit 11: Control number"
          - "Must be unique, unchangeable, and unrepeatable"
          - "Permanent identification code for every Croatian citizen and legal person"
      - type: "CONCAT"
