  - code: "LT"
    name: "Lithuania"
    identifiers:
      - type: "Personal Code (Asmens Kodas)"
        format: "11 numeric digits: GYYMMDDNNNC"
        regex: "^[3456]\\d{10}$"
        conditions:
          - "Total length: 11 digits"
          - "Position 1 (G): Gender (3 or 5 for males, 4 or 6 for females)"
          - "Positions 2-3: Year of birth (YY)"
          - "Positions 4-5: Month of birth (MM)"
