  - code: "EE"
    name: "Estonia"
    identifiers:
      - type: "Estonian Personal Identification Code (Isikukood)"
        format: "11 numeric digits: GYYMMDDSSSC"
        regex: "^[1-6]\\d{10}$"
        conditions:
          - "Total length: 11 digits"
          - "Position 1 (G): Century and gender (1=male 19th, 2=female 19th, 3=male 20th, 4=female 20th, 5=male 21st, 6=female 21st)"
          - "Positions 2-3: Birth year (YY)"
          - "Positions 4-5: Birth month (MM)"
          - "Positions 6-7: Birth day (DD)"
          - "Positions 8-10: Serial number (SSS) separating persons born on same date"
          - "Position 11 (C): Checksum digit"
      - type: "CONCAT"
        format: "CC + YYYYMMDD + NNNNN + SSSSS (20 characters total)"
        regex: "^[A-Z]{2}\d{8}[A-Z#]{5}[A-Z#]{5}$"
        conditions:
          - "Positions 1-2: Two-letter country code"
          - "Positions 3-10: Date of birth in YYYYMMDD format"
          - "Positions 11-15: First 5 characters of first name (padded with # if < 5 chars)"
          - "Positions 16-20: First 5 characters of surname (padded with # if < 5 chars)"
          - "All names converted to uppercase"
          - "Prefixes and punctuation excluded from names"
          - "Spaces in names removed"
          - "Total length: exactly 20 characters"
