        format: "10 numeric digits: DDMMYY + 4 digits"
        regex: "^\\d{10}$"
        conditions:
          - "Total length: 10 digits"
          - "Positions 1-2: Day of birth (DD)"
          - "Positions 3-4: Month of birth (MM)"
          - "Positions 5-6: Year of birth (YY)"
          - "Positions 7-10: Sequential registration identifier digits"
      - type: "CONCAT"
