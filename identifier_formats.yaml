definitions:
  CONCAT:
    name: "CONCAT Format"
    description: "A standardized identifier combining country code, date of birth, and name elements"
    format: "CC + YYYYMMDD + NNNNN + SSSSS"
    total_length: 20
    components:
      - name: "Country Code"
        length: 2
        type: "letters (A-Z)"
        description: "Two-letter ISO country code"
      - name: "Date of Birth"
        length: 8
        type: "numeric (0-9)"
        format: "YYYYMMDD"
        description: "Full date of birth in year-month-day format (YYYY=year, MM=month, DD=day)"
      - name: "First Name"
        length: 5
        type: "letters (A-Z) or padding (#)"
        description: "First five characters of person's first name, padded with '#' if fewer than 5 characters"
      - name: "Surname"
        length: 5
        type: "letters (A-Z) or padding (#)"
        description: "First five characters of person's surname, padded with '#' if fewer than 5 characters"
    rules:
      - "All name characters must be converted to uppercase"
      - "Prefixes in names must be excluded (e.g., 'van', 'de', 'von', 'bin', 'la', 'le')"
      - "All punctuation and special characters in names must be excluded"
      - "Spaces in names should be removed"
      - "If name portion is less than 5 characters, fill remaining positions with '#' character"
      - "Identifier is case-sensitive (uppercase required)"
      - "Format is consistent and unique per individual"
      - "Total identifier length is exactly 20 characters"
    examples:
      - description: "John Smith from Austria born 1985-06-15"
        value: "AT19850615JOHN#SMITH"
      - description: "Marie van der Berg from Belgium born 1992-03-22"
        value: "BE19920322MARIE#BERG##"
      - description: "José García from Spain born 1978-11-30"
        value: "ES19781130JOSE#GARC"
    regex: "^[A-Z]{2}\\d{8}[A-Z#]{5}[A-Z#]{5}$"
    validation:
      - "Check country code is valid ISO 3166-1 alpha-2 code"
      - "Validate date portion represents valid calendar date (YYYYMMDD)"
      - "Ensure first name section contains only A-Z or # characters"
      - "Ensure surname section contains only A-Z or # characters"

countries:
  - code: "AT"
    name: "Austria"
    identifiers:
      - type: "CONCAT"
        format: "CC + YYYYMMDD + NNNNN + SSSSS (20 characters total)"
        regex: "^[A-Z]{2}\d{8}[A-Z#]{5}[A-Z#]{5}$"
        conditions:
          - "Positions 1-2: Two-letter country code"
          - "Positions 3-10: Date of birth in YYYYMMDD format"
          - "Positions 11-15: First 5 characters of first name (padded with # if < 5 chars)"
          - "Positions 16-20: First 5 characters of surname (padded with # if < 5 chars)"
          - "All names converted to uppercase"
          - "Prefixes and punctuation excluded from names"
          - "Spaces in names removed"
          - "Total length: exactly 20 characters"
          - "See definitions section for full CONCAT specification"

  - code: "BE"
    name: "Belgium"
    identifiers:
      - type: "Belgian National Number"
        format: "11 numeric digits: YYMMDD (DOB) + 3 digits (order number) + 2 check digits"
        regex: "^\\d{6}(\\d{3}|\\d{3})\\d{2}$"
        conditions:
          - "Total length: 11 digits"
          - "Positions 1-6: Date of birth in YYMMDD format"
          - "Positions 7-9: Ordering number (odd for males, even for females)"
          - "Positions 10-11: Check digits"
      - type: "CONCAT"
        format: "CC + YYYYMMDD + NNNNN + SSSSS (20 characters total)"
        regex: "^[A-Z]{2}\d{8}[A-Z#]{5}[A-Z#]{5}$"
        conditions:
          - "Positions 1-2: Two-letter country code"
          - "Positions 3-10: Date of birth in YYYYMMDD format"
          - "Positions 11-15: First 5 characters of first name (padded with # if < 5 chars)"
          - "Positions 16-20: First 5 characters of surname (padded with # if < 5 chars)"
          - "All names converted to uppercase"
          - "Prefixes and punctuation excluded from names"
          - "Spaces in names removed"
          - "Total length: exactly 20 characters"
          - "See definitions section for full CONCAT specification"

  - code: "BG"
    name: "Bulgaria"
    identifiers:
      - type: "Bulgarian Personal Number"
        format: "10 numeric digits: YYMMDD + 3 digits (area/order) + 1 digit (gender) + 1 check digit"
        regex: "^\\d{10}$"
        conditions:
          - "Total length: 10 digits"
          - "Positions 1-6: Date of birth in YYMMDD format"
          - "Positions 7-9: Area information and order of birth"
          - "Position 9: Even for males, odd for females"
          - "Positions 7-8: Randomly generated based on city"
          - "Position 10: Check digit"
      - type: "CONCAT"
        format: "CC + YYYYMMDD + NNNNN + SSSSS (20 characters total)"
        regex: "^[A-Z]{2}\d{8}[A-Z#]{5}[A-Z#]{5}$"
        conditions:
          - "Positions 1-2: Two-letter country code"
          - "Positions 3-10: Date of birth in YYYYMMDD format"
          - "Positions 11-15: First 5 characters of first name (padded with # if < 5 chars)"
          - "Positions 16-20: First 5 characters of surname (padded with # if < 5 chars)"
          - "All names converted to uppercase"
          - "Prefixes and punctuation excluded from names"
          - "Spaces in names removed"
          - "Total length: exactly 20 characters"
          - "See definitions section for full CONCAT specification"

  - code: "CY"
    name: "Cyprus"
    identifiers:
      - type: "National Passport Number"
        format: "Variable length: E + 6 digits (pre-2010) OR K + 8 digits (post-2010)"
        regex: "^(E\\d{6}|K\\d{8})$"
        conditions:
          - "Pre-13/12/2010: Letter E followed by exactly 6 digits"
          - "Post-13/12/2010: Letter K followed by exactly 8 digits"
      - type: "CONCAT"
        format: "CC + YYYYMMDD + NNNNN + SSSSS (20 characters total)"
        regex: "^[A-Z]{2}\d{8}[A-Z#]{5}[A-Z#]{5}$"
        conditions:
          - "Positions 1-2: Two-letter country code"
          - "Positions 3-10: Date of birth in YYYYMMDD format"
          - "Positions 11-15: First 5 characters of first name (padded with # if < 5 chars)"
          - "Positions 16-20: First 5 characters of surname (padded with # if < 5 chars)"
          - "All names converted to uppercase"
          - "Prefixes and punctuation excluded from names"
          - "Spaces in names removed"
          - "Total length: exactly 20 characters"
          - "See definitions section for full CONCAT specification"

  - code: "CZ"
    name: "Czech Republic"
    identifiers:
      - type: "National Identification Number (Rodné číslo)"
        format: "9 or 10 alphanumeric: YYXXDD/SSS or YYXXDD/SSSC"
        regex: "^\\d{6}/\\d{3}(\\d)?$"
        conditions:
          - "9 digits: YYXXDD/SSS (no check digit for pre-1954 births)"
          - "10 digits: YYXXDD/SSSC (with check digit for post-1954 births)"
          - "Positions 1-2: Birth year (YY)"
          - "Positions 3-4: Birth month (XX): 01-12 for males, 51-62 (or 71-82) for females (MM+50 or MM+70)"
          - "Positions 5-6: Birth day (DD)"
          - "Positions 8-10: Serial number distinguishing persons born same date (SSS)"
          - "Position 11 (if present): Check digit (modulo 11 of first 9 digits)"
          - "10-digit number should be divisible by 11; if modulo=10, check digit=0"
          - "Special character '/' is separator and should be omitted in transactions"
      - type: "Passport Number"
        format: "8 or more numeric digits"
        regex: "^\\d{8,}$"
        conditions:
          - "Minimum 8 digits, can be longer"
      - type: "CONCAT"
        format: "CC + YYYYMMDD + NNNNN + SSSSS (20 characters total)"
        regex: "^[A-Z]{2}\d{8}[A-Z#]{5}[A-Z#]{5}$"
        conditions:
          - "Positions 1-2: Two-letter country code"
          - "Positions 3-10: Date of birth in YYYYMMDD format"
          - "Positions 11-15: First 5 characters of first name (padded with # if < 5 chars)"
          - "Positions 16-20: First 5 characters of surname (padded with # if < 5 chars)"
          - "All names converted to uppercase"
          - "Prefixes and punctuation excluded from names"
          - "Spaces in names removed"
          - "Total length: exactly 20 characters"
          - "See definitions section for full CONCAT specification"

