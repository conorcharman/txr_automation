  - code: "GB"
    name: "United Kingdom"
    identifiers:
      - type: "UK National Insurance Number"
        format: "9 characters: 2 prefix letters + 6 digits + 1 suffix letter"
        regex: "^(?![DF QUI])[A-Z](?![DFIO])[A-Z]\\d{6}[A-D]$"
        conditions:
          - "Total length: 9 characters"
          - "Positions 1-2: Two prefix letters (not D, F, I, Q, U, V as 1st letter; not O as 2nd letter)"
          - "Positions 3-8: Six digits (0-9)"
          - "Position 9: Suffix letter (A, B, C, or D only)"
          - "Invalid administrative prefixes not to be used: OO, CR, FY, MW, NC, PP, PZ, TN"
      - type: "CONCAT"
        format: "CC + YYYYMMDD + NNNNN + SSSSS (20 characters total)"
        regex: "^[A-Z]{2}\d{8}[A-Z#]{5}[A-Z#]{5}$"
        conditions:
          - "Positions 1-2: Two-letter country code"
          - "Positions 3-10: Date of birth in YYYYMMDD format"
          - "Positions 11-15: First 5 characters of first name (padded with # if < 5 chars)"
          - "Positions 16-20: First 5 characters of surname (padded with # if < 5 chars)"
          - "All names converted to uppercase"
          - "Prefixes and punctuation excluded from names"
