        format: "9 characters: 8 numbers + 1 control letter"
        regex: "^\\d{8}[A-HJ-NP-TV-Z]$"
        conditions:
          - "Residents: 8 digits + 1 letter (not I, Ñ, O, U)"
          - "Non-resident Spaniards: L + 7 digits + control letter"
          - "Spaniards under 14: K + 7 digits + control letter"
          - "Format example for residents: 99111222M"
      - type: "CONCAT"
        format: "CC + YYYYMMDD + NNNNN + SSSSS (20 characters total)"
        regex: "^[A-Z]{2}\d{8}[A-Z#]{5}[A-Z#]{5}$"
        conditions:
