  - code: "DK"
    name: "Denmark"
    identifiers:
      - type: "Personal Identity Code (CPR Number)"
        format: "10 numeric digits: DDMMYYXXXX"
        regex: "^\\d{10}$"
        conditions:
          - "Total length: 10 digits"
          - "Positions 1-2: Day of birth (DD)"
          - "Positions 3-4: Month of birth (MM)"
          - "Positions 5-6: Year of birth (YY)"
          - "Positions 7-10: Sequential/identifier digits (XXXX)"
          - "No whitespace or other delimiters allowed"
      - type: "CONCAT"
        format: "CC + YYYYMMDD + NNNNN + SSSSS (20 characters total)"
        regex: "^[A-Z]{2}\d{8}[A-Z#]{5}[A-Z#]{5}$"
        conditions:
          - "Positions 1-2: Two-letter country code"
          - "Positions 3-10: Date of birth in YYYYMMDD format"
