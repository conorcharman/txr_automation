{% extends "base.html" %}

{% block title %}Dashboard — {{ app_name }}{% endblock %}

{% block content %}
<div class="row mb-4">
  <div class="col">
    <h1 class="h3 mb-1">
      <i class="bi bi-grid-3x3-gap-fill text-primary me-2"></i>Dashboard
    </h1>
    <p class="text-muted mb-0">
      Select an automation module below to get started.
    </p>
  </div>
</div>

<div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
  {% for section in sections %}
  <div class="col">
    <div class="card h-100 shadow-sm section-card border-0">
      <div class="card-body">
        <div class="d-flex align-items-center mb-3">
          <div class="section-icon bg-{{ section.colour }} bg-opacity-10 text-{{ section.colour }} rounded-3 p-2 me-3">
            <i class="bi {{ section.icon }} fs-4"></i>
          </div>
          <h5 class="card-title mb-0">{{ section.title }}</h5>
        </div>
        <p class="card-text text-muted small">{{ section.description }}</p>
      </div>
      <div class="card-footer bg-transparent border-0 pb-3">
        <a
          href="{{ url_for('dashboard.section', section_id=section.id) }}"
          class="btn btn-{{ section.colour }} btn-sm"
        >
          <i class="bi bi-arrow-right-circle me-1"></i>Open
        </a>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
