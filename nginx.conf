worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # ---------------------------------------------------------------------------
    # Gzip compression
    # ---------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ---------------------------------------------------------------------------
    # Upstream — FastAPI backend
    # ---------------------------------------------------------------------------
    upstream api_backend {
        server api:8000;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ------------------------------------------------------------------
        # WebSocket proxy — must come before the general /api/ block
        # ------------------------------------------------------------------
        location /api/ws/ {
            proxy_pass http://api_backend/api/ws/;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long timeout so connections are not dropped unexpectedly
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ------------------------------------------------------------------
        # REST API proxy
        # ------------------------------------------------------------------
        location /api/ {
            proxy_pass http://api_backend/api/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ------------------------------------------------------------------
        # SPA — serve index.html for all unmatched routes (client-side routing)
        # ------------------------------------------------------------------
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ------------------------------------------------------------------
        # Static assets — aggressive caching for hashed filenames
        # ------------------------------------------------------------------
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
    }
}
