# Phase 3 Processor Configuration
# Configure paths and behavior for Phase 3 processing (Inconsistent IDs/Names)

paths:
  # Input replay files (CSV format)
  replay_input: "/Users/conorcharman/Documents/GitHub/txr_automation/data/sample/phase_iii/csv"
  
  # Incident code reference files (CSV format)
  incident_files: "/Users/conorcharman/Documents/GitHub/txr_automation/data/sample/incident_code_files"
  
  # Output directory for processed replay files
  replay_output: "/Users/conorcharman/Documents/GitHub/txr_automation/data/output/phase_iii"
  
  # Log output directory
  log_output: "/Users/conorcharman/Documents/GitHub/txr_automation/data/output/logs"

files:
  # Replay file patterns (glob syntax supported)
  replay_patterns:
    - "Replay_*_PHASE 3_Inconsistent_IDs_Summary_FINAL.csv"
    - "Replay_*_PHASE 3_Inconsistent_Names_Summary_FINAL.csv"
  
  # Incident file pattern
  incident_pattern: "FY25 Q3 - *.csv"

processor:
  # Batch size for progress reporting
  batch_size: 100
  
  # Log level (DEBUG, INFO, WARNING, ERROR)
  log_level: "INFO"
  
  # Similarity threshold for fuzzy name matching (0.0 - 1.0)
  similarity_threshold: 0.85
  
  # Output filename pattern (e.g., replace KR with AJB)
  replace_pattern:
    from: "KR"
    to: "AJB"
