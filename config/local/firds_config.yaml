# FCA FIRDS Configuration Template
# ==================================
# Copy this file to config/local/firds.yaml and adjust paths for your environment.
# The firds-refresh and firds-check scripts will use this file when --config is supplied.

# ---------------------------------------------------------------------------
# Database
# ---------------------------------------------------------------------------
database:
  # Path to the SQLite cache file (relative to repo root, or absolute)
  path: C:\Users\ccharm\Desktop\Data\txr_automated_accuracy_testing\firds\firds_cache.db

# ---------------------------------------------------------------------------
# Staging
# ---------------------------------------------------------------------------
staging:
  # Temporary directory used for ZIP downloads and XML extraction.
  # Set to null to use a system-managed temp directory (auto-cleaned).
  # Providing an explicit path is useful when disk space is constrained and
  # you want to ensure staging occurs on a specific drive.
  directory: null  # e.g. C:/tmp/firds_staging

# ---------------------------------------------------------------------------
# Refresh schedule (informational – used by documentation and the scheduler)
# ---------------------------------------------------------------------------
refresh:
  # Full refresh: run weekly, targeting the most recent Saturday publication.
  full:
    # Publication date of the FULINS files to load.
    # Set to null to automatically use the most recent Saturday.
    target_date: null  # e.g. 2026-03-07

  # Delta refresh: run daily, applying DLTINS changes since last run.
  delta:
    # Start date for the delta range.
    # Set to null to default to yesterday (suitable for a daily scheduled job).
    since_date: null  # e.g. 2026-03-09

# ---------------------------------------------------------------------------
# API client
# ---------------------------------------------------------------------------
api:
  # Timeout in seconds for HTTP requests to the FCA FIRDS file index API.
  # Note: the actual file downloads are not throttled (different CDN).
  timeout_seconds: 30

  # Delay in seconds between paginated file index API requests.
  # The index API is rate-limited; this value prevents accidental overloading.
  index_request_delay_seconds: 1.0

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
processor:
  log_level: INFO   # DEBUG | INFO | WARNING | ERROR
  log_output: logs
