# Example YAML configuration for Phase 3 Final Lookup
# Copy this file and modify paths as needed

paths:
  # Input directory containing Phase 2 and Phase 3 output files
  replay_input: /path/to/replay/output
  
  # UnaVista export file path
  unavista_file: /path/to/UnaVista_MiFIR_Manual_Corrections.csv
  
  # Output directory for final lookup results
  replay_output: /path/to/final/output
  
  # Directory for log files
  log_output: /path/to/logs

processing:
  # Number of records to process per batch (for progress reporting)
  batch_size: 50
  
  # Logging level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_level: INFO
  
  # Enable/disable progress reporting
  enable_progress_reporting: true
  
  # File encoding
  encoding: utf-8
