# Inconsistent Buyer ID Validation Configuration
# ===============================================
#
# Template for incident code 7_66 (Inconsistent Buyer ID)
# Use this for scenarios where the same person has different IDs across trades.
#
# Algorithm Overview:
# 1. Groups records by Person Code
# 2. Sorts each group chronologically by Trade_Date_Time
# 3. Validates each ID using standard format + logic rules
# 4. Corrects INVALID IDs using most recent PRIOR VALID ID
#
# Key differences from standard validation:
# - Only corrects invalid IDs (fallback pattern or failed format/logic)
# - Valid-to-valid ID changes are preserved (not corrected)
# - Requires Trade_Date_Time field for chronological ordering

# Testing period configuration
testing_period:
  # Fiscal year (e.g., FY25, FY26)
  fiscal_year: "FY25"
  
  # Quarter (e.g., Q1, Q2, Q3, Q4)
  quarter: "Q3"

# Incident codes to validate
# For inconsistent ID validation, only incident 7_66 is supported
incidents:
  - "7_66"

# File paths
# Note: For inconsistent ID validation:
# 1. Extract file (input) - SQL database export with Trade_Date_Time for chronological ordering
# 2. Template file (Kaizen lookup) - Optional, contains expected correct ID values
# 3. Output file - Where validation results are written

paths:
  # SQL extract file (input) containing records with Trade_Date_Time field
  # Required columns: Transaction Reference, Account ID, Trade_Date_Time,
  #                   Person Code, Account Type, Buyer ID Code, Type of Buyer ID Code,
  #                   First Name, Surname, Date of Birth, Gender, 
  #                   Primary Nationality, Secondary Nationality
  input_file: "data/input/accuracy_testing/extracts/inconsistent_buyer_extract_7_66.csv"
  
  # Output file with corrections applied
  output_file: "data/output/accuracy_testing/inconsistent_buyer_validated_7_66.csv"
  
  # Log output directory
  log_output: "logs"
  
  # Optional: Italian tracker CSV file for IT fiscal code validation
  # Format: Column C = Person Code, Column G = Status
  # italian_tracker: "path/to/italian_tracker.csv"
  
  # Optional: Main tracker CSV file for client data remediation
  # Format: Column J = Person Code, Column N = Status
  # main_tracker: "path/to/main_tracker.csv"
  
  # Optional: Kaizen template file for expected value lookup/comparison
  # This is separate from the extract file - it contains the expected correct values
  # template_file: "data/output/accuracy_testing/templates/FY25 Q3 7_66.csv"
  # template_id_column: 21  # Column V (0-indexed, for expected ID)
  # template_type_column: 22  # Column W (0-indexed, for expected type)

# Processor configuration
processor:
  # Logging level: DEBUG, INFO, WARNING, ERROR
  log_level: "DEBUG"
  
  # Enable verbose console output
  verbose: true
  
  # Batch size for processing (future use)
  batch_size: 1000

# Example usage:
# --------------
# python -m src.accuracy_testing.scripts.inconsistent_buyer_id_validation --config config/local/accuracy_testing/inconsistent_buyer.yaml
# 
# Or with CLI arguments:
# python -m src.accuracy_testing.scripts.inconsistent_buyer_id_validation input.csv output.csv --log-level DEBUG
#
# Or with environment variables:
# export TXR_PATHS_INPUT_FILE="data/buyer_input.csv"
# export TXR_PATHS_OUTPUT_FILE="data/buyer_output.csv"
# python -m src.accuracy_testing.scripts.inconsistent_buyer_id_validation --use-env
