# Inconsistent Buyer ID Validation Configuration Template
# =========================================================
#
# Validates inconsistent buyer ID codes across time for the same person.
# Script: inconsistent_buyer_id_validation.py
# Incident: 7_66 (Inconsistent Buyer Identification Codes)
#
# Algorithm:
#   1. Groups records by Person Code
#   2. Sorts chronologically by Trade_Date_Time
#   3. Validates each ID (format + logic)
#   4. Corrects INVALID IDs using most recent PRIOR VALID ID
#   5. Valid-to-valid ID changes are preserved (not corrected)
#
# Usage:
#   python -m src.accuracy_testing.scripts.inconsistent_buyer_id_validation \
#       --config config/local/accuracy_testing/inconsistent_buyer_validation.yaml

# =============================================================================
# Configuration Mode
# =============================================================================
# Options: "single" only (no batch mode for inconsistent ID validation)
# Inconsistent ID validation requires one extract file per execution
mode: "single"

# =============================================================================
# Testing Period
# =============================================================================
testing_period:
  # Fiscal year (e.g., FY25, FY26)
  fiscal_year: "FY26"
  
  # Quarter (e.g., Q1, Q2, Q3, Q4)
  quarter: "Q1"

# =============================================================================
# Single Mode Configuration
# =============================================================================
# Process one incident with explicit file paths
single:
  # Incident code (must be 7_66)
  incident_code: "7_66"
  
  paths:
    # Extract file (SQL database export) - validation input
    # MUST include Trade_Date_Time column for chronological ordering
    # Example: 7_66_FY26_Q1.csv
    input_file: "data/extracts/7_66_FY26_Q1.csv"
    
    # Template file (Kaizen expected values) - validation reference
    # Example: FY26 Q1 7_66.csv
    template_file: "data/templates/FY26 Q1 7_66.csv"
    
    # Template column names for Kaizen lookup
    template_id_column: "Buyer identification code"
    template_type_column: "Type of buyer identification code"
    
    # Output file (validation results)
    # Example: validated_FY26_Q1_7_66.csv
    output_file: "data/validated/validated_FY26_Q1_7_66.csv"
    
    # Optional: Tracker files for additional validation context
    # italian_tracker: "data/trackers/italian_tracker.csv"
    # main_tracker: "data/trackers/main_tracker.csv"
    
    # Log output directory
    log_output: "logs"

# =============================================================================
# Tracker Configuration
# =============================================================================
# Column names for tracker file lookups
tracker:
  # Column containing transaction references in tracker files
  transaction_ref_column: "Transaction Reference"
  
  # Column containing ID values in tracker files
  id_column: "Buyer ID Code"
  
  # Column containing ID types in tracker files
  type_column: "Type of Buyer ID Code"

# =============================================================================
# Options
# =============================================================================
options:
  # Dry run mode - preview validation without writing output files
  dry_run: false
  
  # Show progress bars during processing
  show_progress: true

# =============================================================================
# Processor Configuration
# =============================================================================
processor:
  # Logging level: DEBUG, INFO, WARNING, ERROR
  log_level: "INFO"
  
  # Enable verbose console output
  verbose: false

# =============================================================================
# Required Input Columns
# =============================================================================
# The extract file MUST contain these columns:
#   - Transaction Reference
#   - Account ID
#   - Trade_Date_Time         (REQUIRED for chronological sorting)
#   - Person Code             (REQUIRED for grouping)
#   - Account Type
#   - Buyer ID Code
#   - Type of Buyer ID Code
#   - First Name
#   - Surname
#   - Date of Birth
#   - Gender
#   - Primary Nationality
#   - Secondary Nationality
#
# Note: Unlike standard validation, this script requires Trade_Date_Time
# to determine the chronological order of IDs for the same person.

# =============================================================================
# Validation Logic
# =============================================================================
# 1. Records are grouped by Person Code
# 2. Within each group, sorted by Trade_Date_Time (ascending)
# 3. Each ID is validated:
#    - Format validation (regex patterns)
#    - Logic validation (checksums, CONCAT consistency)
# 4. Corrections applied:
#    - INVALID IDs: Corrected to most recent prior VALID ID
#    - VALID IDs:   Preserved (even if different from prior valid ID)
# 5. Output includes:
#    - Original columns
#    - Correction (corrected ID value, if any)
#    - Error Flag (Y if correction applied, N otherwise)
#
# Example scenario:
#   Trade 1 (2024-01-01): AB123456C (VALID)   → No correction
#   Trade 2 (2024-02-01): XY999999Z (INVALID) → Corrected to AB123456C
#   Trade 3 (2024-03-01): CD789012D (VALID)   → No correction (valid change)
#   Trade 4 (2024-04-01): FALLBACK   (INVALID) → Corrected to CD789012D
