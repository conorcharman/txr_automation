# Seller ID Validation Configuration
# ==================================

# Testing period configuration
testing_period:
  # Fiscal year (e.g., FY25, FY26)
  fiscal_year: "FY25"
  
  # Quarter (e.g., Q1, Q2, Q3, Q4)
  quarter: "Q3"

# Incident codes to validate (batch processing)
# Option 1: Auto-discover all seller incidents (RECOMMENDED)
# Set to "all" to automatically process all seller-related incidents
# This will discover: 16_*, 17_*, 18_*, 19_*, 20_*, 21_*, 22_*, 23_*, 24_*, 36_23
# Note: Decision maker incidents (16_20, 16_64) are auto-detected and skipped with warnings
auto_incidents: "all"

# Option 2: Specify incidents manually (uncomment and modify below, comment out auto_incidents)
# incidents:
#   - "16_19"
#   - "16_21"
#   - "16_23"
#   - "16_20"

# File paths
paths:
  # Template directory (contains files named "FY25 Q3 16_21.csv")
  template_dir: "data/output/accuracy_testing/templates"
  
  # Output directory for validated files
  output_dir: "data/output/accuracy_testing/validated"
  
  # Log output directory
  log_output: "logs"

# Processor configuration
processor:
  # Logging level: DEBUG, INFO, WARNING, ERROR
  log_level: "INFO"
  
  # Enable verbose console output
  verbose: false
  
  # Batch size for processing (future use)
  batch_size: 1000
