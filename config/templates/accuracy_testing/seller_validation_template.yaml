# Seller ID Validation Configuration
# ==================================

# Testing period configuration
testing_period:
  # Fiscal year (e.g., FY25, FY26)
  fiscal_year: "FY25"
  
  # Quarter (e.g., Q1, Q2, Q3, Q4)
  quarter: "Q3"

# Incident codes to validate (batch processing)
# Seller validation incident codes: 16_19, 16_21, 16_23, 16_20
incidents:
  - "16_19"
  - "16_21"
  - "16_23"
  - "16_20"

# File paths
paths:
  # Template directory (contains files named "FY25 Q3 16_21.csv")
  template_dir: "data/output/accuracy_testing/templates"
  
  # Output directory for validated files
  output_dir: "data/output/accuracy_testing/validated"
  
  # Log output directory
  log_output: "logs"

# Processor configuration
processor:
  # Logging level: DEBUG, INFO, WARNING, ERROR
  log_level: "INFO"
  
  # Enable verbose console output
  verbose: false
  
  # Batch size for processing (future use)
  batch_size: 1000
