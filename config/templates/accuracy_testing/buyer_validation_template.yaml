# Buyer ID Validation Configuration Template
# ==========================================
#
# Validates buyer identification codes for standard ID incidents.
# Script: buyer_id_validation.py
# Incidents: 7_35 (CONCAT), 7_37 (NIDN), 7_39 (CCPT)
#
# Usage:
#   python -m src.accuracy_testing.scripts.buyer_id_validation \
#       --config config/local/accuracy_testing/buyer_validation.yaml

# =============================================================================
# Configuration Mode
# =============================================================================
# Options: "single" or "batch"
# - single: Process one incident with explicit file paths
# - batch:  Process multiple incidents using filename patterns
mode: "batch"

# =============================================================================
# Testing Period
# =============================================================================
testing_period:
  # Fiscal year (e.g., FY25, FY26)
  fiscal_year: "FY26"
  
  # Quarter (e.g., Q1, Q2, Q3, Q4)
  quarter: "Q1"

# =============================================================================
# Single Mode Configuration
# =============================================================================
# Used when mode: "single"
# Specify exact file paths for one incident
single:
  # Incident code to validate
  incident_code: "7_37"
  
  paths:
    # Extract file (SQL database export) - validation input
    input_file: "data/extracts/7_37_FY26_Q1.csv"
    
    # Template file (Kaizen expected values) - validation reference
    template_file: "data/templates/FY26 Q1 7_37.csv"
    
    # Template column names for Kaizen lookup
    template_id_column: "Buyer identification code"
    template_type_column: "Type of buyer identification code"
    
    # Output file (validation results)
    output_file: "data/validated/validated_FY26_Q1_7_37.csv"
    
    # Optional: Tracker files for additional validation context
    # italian_tracker: "data/trackers/italian_tracker.csv"
    # main_tracker: "data/trackers/main_tracker.csv"
    
    # Log output directory
    log_output: "logs"

# =============================================================================
# Batch Mode Configuration
# =============================================================================
# Used when mode: "batch"
# Process multiple incidents automatically
batch:
  # Incidents to process
  # Options:
  #   - "auto": Auto-discover all standard buyer incidents using auto_incidents list
  #   - List: ["7_35", "7_37", "7_39"]
  incidents: "auto"
  
  # Incident codes for auto-discovery mode
  # Used when incidents: "auto" is specified
  auto_incidents:
    - "7_35"  # Incorrect CONCAT value
    - "7_37"  # Incorrect NIDN value
    - "7_39"  # Incorrect CCPT value
  
  paths:
    # Directory containing extract files (SQL database exports)
    extract_dir: "data/extracts/FY26/Q1"
    
    # Directory containing template files (Kaizen expected values)
    template_dir: "data/templates/FY26/Q1"
    
    # Directory for output files (validation results)
    output_dir: "data/validated/FY26/Q1"
    
    # Optional: Tracker files (same for all incidents)
    # italian_tracker: "data/trackers/italian_tracker.csv"
    # main_tracker: "data/trackers/main_tracker.csv"
    
    # Log output directory
    log_output: "logs"
  
  # Filename patterns - construct filenames for each incident
  # Available variables: {incident}, {fiscal_year}, {quarter}
  filename_patterns:
    # Extract file (SQL database export) - validation input
    # Example: 7_37_FY26_Q1.csv
    extract: "{incident}_{fiscal_year}_{quarter}.csv"
    
    # Template file (Kaizen expected values) - validation reference
    # Example: FY26 Q1 7_37.csv
    template: "{fiscal_year} {quarter} {incident}.csv"
    
    # Output file (validation results)
    # Example: validated_FY26_Q1_7_37.csv
    output: "validated_{fiscal_year}_{quarter}_{incident}.csv"

# =============================================================================
# Tracker Configuration
# =============================================================================
# Column names for tracker file lookups
tracker:
  # Column containing transaction references in tracker files
  transaction_ref_column: "Transaction Reference"
  
  # Column containing ID values in tracker files
  id_column: "Buyer ID Code"
  
  # Column containing ID types in tracker files
  type_column: "Type of Buyer ID Code"

# =============================================================================
# Options
# =============================================================================
options:
  # Dry run mode - preview validation without writing output files
  dry_run: false
  
  # Show progress bars during processing
  show_progress: true

# =============================================================================
# Processor Configuration
# =============================================================================
processor:
  # Logging level: DEBUG, INFO, WARNING, ERROR
  log_level: "INFO"
  
  # Enable verbose console output
  verbose: false

# =============================================================================
# Supported Incident Codes
# =============================================================================
# This script handles standard buyer ID validation:
#   - 7_35: Incorrect CONCAT value within Buyer identification code field
#   - 7_37: Incorrect NIDN value within Buyer identification code field
#   - 7_39: Incorrect CCPT value within Buyer identification code field
#
# Note: This script does NOT handle:
#   - 7_66:  Inconsistent Buyer ID (use inconsistent_buyer_validation_template.yaml)
#   - 12_17: Buyer Decision Maker (use ftbdm_validation_template.yaml)
