# Buyer ID Validation Configuration
# ==================================

# Testing period configuration
testing_period:
  # Fiscal year (e.g., FY25, FY26)
  fiscal_year: "FY26"
  
  # Quarter (e.g., Q1, Q2, Q3, Q4)
  quarter: "Q1"

# Incident codes to validate (batch processing)
# Option 1: Auto-discover all buyer incidents (RECOMMENDED)
# Set to "all" to automatically process all buyer-related incidents
# This will discover: 7_*, 8_*, 9_*, 10_*, 11_*, 12_*, 13_*, 14_*, 15_*, 21_2
# Note: Decision maker incidents (7_66, 7_68) are auto-detected and skipped with warnings
# auto_incidents: "all"

# Option 2: Specify incidents manually (uncomment and modify below, comment out auto_incidents)
incidents:
  - "7_35"
  - "7_37"
  - "7_39"

# File paths
# Note: Three separate files are involved in the validation workflow:
# 1. Extract file (input) - SQL database export containing transaction data to validate
# 2. Template file (Kaizen lookup) - Contains expected correct ID values for comparison
# 3. Output file - Where validation results are written

paths:
  # SQL extract directory (contains database export CSV files)
  # Example files: "buyer_extract_7_37.csv", "buyer_extract_7_39.csv"
  extract_dir: 'C:\Users\ccharm\Desktop\Data\txr_automated_accuracy_testing\accuracy_testing\2026\Q1\extracts'
  
  # Template directory (contains Kaizen template files with expected values)
  # Example files: "FY26 Q1 7_37.csv", "FY26 Q1 7_39.csv"
  # These files contain the expected correct ID values in columns for comparison
  template_dir: 'C:\Users\ccharm\Desktop\Data\txr_automated_accuracy_testing\accuracy_testing\2026\Q1\incident_code_analysis'
  
  # Output directory for validated files
  output_dir: 'C:\Users\ccharm\Desktop\Data\txr_automated_accuracy_testing\accuracy_testing\2026\Q1\validated'
  
  # Log output directory
  log_output: 'C:\Users\ccharm\Desktop\Data\txr_automated_accuracy_testing\accuracy_testing\2026\Q1\logs'
  
  # Optional: Italian tracker CSV file for IT fiscal code validation
  # Format: Column C = Person Code, Column G = Status
  italian_tracker: 'C:\Users\ccharm\Desktop\Data\txr_automated_accuracy_testing\Transaction Reporting - Italian Fiscal Code Validation.csv'
  
  # Optional: Main tracker CSV file for client data remediation
  # Format: Column J = Person Code, Column N = Status
  # main_tracker: "path/to/main_tracker.csv"

# Processor configuration
processor:
  # Logging level: DEBUG, INFO, WARNING, ERROR
  log_level: "INFO"
  
  # Enable verbose console output
  verbose: true
  
  # Batch size for processing (future use)
  # batch_size: 1000
