# SQL Extract Generator Configuration Template
# ==============================================
#
# Generates SQL extract files from accuracy testing template CSV files.
# Script: sql_extract_generator.py
# Supports ALL 12 automated incidents
#
# Note: The template now covers 13 automated incidents (7_42 added).
#
# Usage:
#   python -m src.accuracy_testing.scripts.sql_extract_generator \
#       --config config/local/accuracy_testing/sql_extract_generator.yaml

# =============================================================================
# Configuration Mode
# =============================================================================
# Options: "single" or "batch"
# - single: Generate SQL for one incident with explicit paths
# - batch:  Generate SQL for multiple incidents using filename patterns
mode: "batch"

# =============================================================================
# Testing Period
# =============================================================================
testing_period:
  # Fiscal year (e.g., FY25, FY26)
  fiscal_year: "FY26"
  
  # Quarter (e.g., Q1, Q2, Q3, Q4)
  quarter: "Q1"

# =============================================================================
# Single Mode Configuration
# =============================================================================
# Used when mode: "single"
# Generate SQL for one incident with explicit paths
single:
  # Incident code to process
  incident_code: "7_37"
  
  paths:
    # Template CSV file (contains Transaction References)
    # Example: FY26 Q1 7_37.csv
    template_file: "data/templates/FY26 Q1 7_37.csv"
    
    # SQL template file (contains SQL with placeholder)
    # Example: BuyerID.sql
    sql_template_file: "src/accuracy_testing/sql_templates/BuyerID.sql"
    
    # DTF template file (AS/400 Data Transfer format)
    # Optional: Only needed if generating DTF files
    dtf_template_file: "src/accuracy_testing/sql_templates/AS400_DataTransfer_template.dtf"
    
    # Output directory for generated SQL/DTF files
    output_dir: "data/sql_extracts"
    
    # Log output directory
    log_output: "logs"

# =============================================================================
# Batch Mode Configuration
# =============================================================================
# Used when mode: "batch"
# Process multiple incidents automatically
batch:
  # Incidents to process
  # Options:
  #   - "all": Process ALL automated incidents using all_incidents list
  #   - List: ["7_35", "7_37", "7_39", "7_66", "12_17", "16_19", "16_21", "16_23", "16_20", "21_17", "35_3"]
  incidents: "all"
  
  # All automated incident codes (used when incidents: "all" is specified)
  all_incidents:
    - "7_6"    # Non-Zero Net Quantity (INTC ISIN trade where quantity does not net to zero)
    - "7_42"   # Non-Zero Net Value (INTC ISIN trade where net amount does not net to zero)
    - "7_35"   # Buyer ID: CONCAT
    - "7_37"   # Buyer ID: NIDN
    - "7_39"   # Buyer ID: CCPT
    - "7_66"   # Inconsistent Buyer ID
    - "12_17"  # Buyer Decision Maker
    - "16_19"  # Seller ID: CONCAT
    - "16_21"  # Seller ID: NIDN
    - "16_23"  # Seller ID: CCPT
    - "16_20"  # Inconsistent Seller ID
    - "21_17"  # Seller Decision Maker
    - "35_3"   # Pricing Validation
  
  paths:
    # Directory containing template CSV files
    # Expected format: FY26 Q1 7_37.csv
    template_dir: "data/templates/FY26/Q1"
    
    # Directory containing SQL template files
    # Required files: BuyerID.sql, SellerID.sql, InconsistentBuyerID.sql, etc.
    sql_template_dir: "src/accuracy_testing/sql_templates"
    
    # DTF template file (AS/400 Data Transfer format)
    # Optional: Only needed if output_format includes 'dtf'
    dtf_template_file: "src/accuracy_testing/sql_templates/AS400_DataTransfer_template.dtf"
    
    # Output directory for generated SQL/DTF files
    # Subdirectories created: sql/, dtf/, csv/
    output_dir: "data/sql_extracts/FY26/Q1"
    
    # Log output directory
    log_output: "logs"
  
  # Filename patterns - construct filenames for each incident
  # Available variables: {incident}, {fiscal_year}, {quarter}
  filename_patterns:
    # Template CSV file (contains Transaction References)
    # Example: FY26 Q1 7_37.csv
    template: "{fiscal_year} {quarter} {incident}.csv"
    
    # Output SQL file (single batch)
    # Example: 7_37_FY26_Q1.sql
    output_sql: "{incident}_{fiscal_year}_{quarter}.sql"
    
    # Output SQL file (multiple batches)
    # Example: 7_37_FY26_Q1_Extract1.sql
    output_sql_batch: "{incident}_{fiscal_year}_{quarter}_Extract{batch_num}.sql"
    
    # Output DTF file (single batch)
    # Example: 7_37_FY26_Q1.dtf
    output_dtf: "{incident}_{fiscal_year}_{quarter}.dtf"
    
    # Output DTF file (multiple batches)
    # Example: 7_37_FY26_Q1_Extract1.dtf
    output_dtf_batch: "{incident}_{fiscal_year}_{quarter}_Extract{batch_num}.dtf"
    
    # Output CSV file (for AS/400 Data Transfer Tool)
    # Example: 7_37_FY26_Q1.csv
    output_csv: "{incident}_{fiscal_year}_{quarter}.csv"
    
    # Output CSV file (multiple batches)
    # Example: 7_37_FY26_Q1_Extract1.csv
    output_csv_batch: "{incident}_{fiscal_year}_{quarter}_Extract{batch_num}.csv"

# =============================================================================
# SQL Template Mapping
# =============================================================================
# Automatic mapping of incident codes to SQL template files
# The tool uses this to select the correct SQL template for each incident
sql_template_mapping:
  # Non-Zero Net Quantity incident (7_6) — uses VALUES block CTE, not an IN-clause
  non_zero_net_qty: "NonZeroNetQuantity.sql"

  # Non-Zero Net Value incident (7_42) — uses VALUES block CTE, not an IN-clause
  non_zero_net_val: "NonZeroNetValue.sql"

  # Standard Buyer ID incidents (7_35, 7_37, 7_39)
  buyer_standard: "BuyerID.sql"
  
  # Inconsistent Buyer ID incident (7_66)
  buyer_inconsistent: "InconsistentBuyerID.sql"
  
  # Buyer Decision Maker incident (12_17)
  buyer_decision_maker: "FTBDM.sql"
  
  # Standard Seller ID incidents (16_19, 16_21, 16_23)
  seller_standard: "SellerID.sql"
  
  # Inconsistent Seller ID incident (16_20)
  seller_inconsistent: "InconsistentSellerID.sql"
  
  # Seller Decision Maker incident (21_17)
  seller_decision_maker: "FTSDM.sql"
  
  # Pricing incident (35_3)
  pricing: "SCR_pricing_data_v1.0.sql"

# =============================================================================
# Processing Options
# =============================================================================
processing:
  # Maximum transaction references per SQL file (default: 900)
  # If template CSV has more refs, output is split into multiple files
  batch_size: 900
  
  # Placeholder pattern in SQL templates (replaced with transaction refs)
  # Example: "-- TRANSACTION REFERENCES --"
  placeholder_pattern: "-- TRANSACTION REFERENCES --"
  
  # CSV column name containing transaction references
  transaction_column: "Transaction Reference"
  
  # Output format: 'sql', 'dtf', or 'both'
  # - 'sql': Generate only SQL files (in /sql or /csv subdirectory)
  # - 'dtf': Generate only DTF files (in /dtf subdirectory)
  # - 'both': Generate both SQL and DTF files
  output_format: "both"

# =============================================================================
# Options
# =============================================================================
options:
  # Dry run mode - preview SQL generation without writing files
  dry_run: false
  
  # Show progress bars during processing
  show_progress: true
  
  # Overwrite existing files
  overwrite: true

# =============================================================================
# Processor Configuration
# =============================================================================
processor:
  # Logging level: DEBUG, INFO, WARNING, ERROR
  log_level: "INFO"
  
  # Enable verbose console output
  verbose: false

# =============================================================================
# Supported Incident Codes (ALL 11)
# =============================================================================
# This script generates SQL extracts for ALL automated incidents:
#   - 7_6:   INTC ISIN trade where quantity does not net to zero
#   - 7_42:  INTC ISIN trade where net amount does not net to zero
#   - 7_35:  Incorrect CONCAT value within Buyer identification code field
#   - 7_37:  Incorrect NIDN value within Buyer identification code field
#   - 7_39:  Incorrect CCPT value within Buyer identification code field
#   - 7_66:  Inconsistent Buyer Identification Codes
#   - 12_17: Incorrect ID of Buyer Decision Maker
#   - 16_19: Incorrect CONCAT value within Seller identification code field
#   - 16_21: Incorrect NIDN value within Seller identification code field
#   - 16_23: Incorrect CCPT value within Seller identification code field
#   - 16_20: Inconsistent Seller Identification Codes
#   - 21_17: Incorrect ID of Seller Decision Maker
#   - 35_3:  Incorrect Value Compensation for Trading Positions (Pricing)
#
# Note: 7_6 and 7_42 use a DB2 VALUES block CTE instead of a SQL IN-clause—references
# are split into five component fields and any CA-prefixed references are excluded.
#
# Note: Unlike validation scripts, SQL generator supports ALL incidents in batch
# mode because it only generates SQL queries (no validation logic).
