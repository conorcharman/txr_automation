# SQL Extract Generator Configuration Template
# ===========================================
# Generates SQL extract files from validated transaction data.
# Supports both single-incident and batch processing modes.
#
# Usage:
#   Single mode:  generate-sql-extract --config single_config.yaml
#   Batch mode:   generate-sql-extract --config batch_config.yaml
#
# Batch Mode (recommended):
#   Configure testing_period, incidents list, and paths.
#   The tool will:
#   - Automatically select the correct SQL template for each incident
#   - Read transaction refs from validated CSV files
#   - Generate SQL extracts with FY/Q naming
#   - Split large datasets into multiple files (batch_size)
#
# Single Mode (legacy):
#   Provide template_file, input_file, and output_directory.
#   Useful for one-off extractions or custom workflows.

# =============================================================================
# BATCH MODE CONFIGURATION (RECOMMENDED)
# =============================================================================

# Testing period
testing_period:
  fiscal_year: "FY26"      # Fiscal year (e.g., FY25, FY26)
  quarter: "Q1"            # Quarter (Q1, Q2, Q3, Q4)

# Incident codes to process
incidents:
  - "7_35"   # Buyer ID
  - "7_37"
  - "7_39"
  - "16_19"  # Seller ID
  - "16_21"
  - "16_23"
  - "35_3"   # Pricing data

# Paths for batch mode
paths:
  # Directory containing validated CSV files (from validation scripts)
  # Expected format: validated_FY26_Q1_7_37.csv
  template_dir: "data/validated"
  
  # Directory for SQL template files
  # Templates: BuyerID.sql, SellerID.sql, SCR_pricing_data_v1.0.sql, etc.
  sql_template_dir: "src/accuracy_testing/sql_templates"
  
  # Output directory for generated SQL files
  # Generated format: 7_37_FY25_Q3.sql or 7_37_FY25_Q3_Extract1.sql
  output_directory: "data/sql_extracts"

# Processing options
processing:
  # Maximum transactions per SQL file (default: 900)
  # Large datasets will be split into multiple files
  batch_size: 900
  
  # Placeholder pattern in SQL templates (default: "-- TRANSACTION REFERENCES --")
  placeholder_pattern: "-- TRANSACTION REFERENCES --"
  
  # CSV column name containing transaction references
  transaction_column: "Transaction Ref"

# =============================================================================
# SQL TEMPLATE MAPPING (AUTOMATIC IN BATCH MODE)
# =============================================================================
# The tool automatically selects SQL templates based on incident codes:
#
# Buyer ID incidents (7_*, 8_*, 9_*, etc.):     → BuyerID.sql
# Seller ID incidents (16_*, 17_*, etc.):       → SellerID.sql
# Pricing incidents (35_3):                     → SCR_pricing_data_v1.0.sql
# Inconsistent Buyer (7_66, 7_68):              → InconsistentBuyerID.sql
# Inconsistent Seller (16_20, 16_64):           → InconsistentSellerID.sql
# Decision Maker Buyer (12_*):                  → FTBDM.sql
# Decision Maker Seller (21_*):                 → FTSDM.sql

# =============================================================================
# SINGLE MODE CONFIGURATION (LEGACY)
# =============================================================================
# Uncomment and configure these for single-incident processing:

# paths:
#   # SQL template file with placeholder
#   template_file: "src/accuracy_testing/sql_templates/BuyerID.sql"
#   
#   # Input CSV with transaction references
#   input_file: "data/validated/validated_FY25_Q3_7_37.csv"
#   
#   # Output directory
#   output_directory: "data/sql_extracts"

# processing:
#   batch_size: 900
#   placeholder_pattern: "-- TRANSACTION REFERENCES --"
#   transaction_column: "Transaction Ref"

# =============================================================================
# EXAMPLES
# =============================================================================
#
# Example 1: Batch mode with multiple incidents
# ----------------------------------------------
# testing_period:
#   fiscal_year: "FY25"
#   quarter: "Q3"
# incidents: ["7_37", "16_21", "35_3"]
# paths:
#   template_dir: "data/validated"
#   sql_template_dir: "src/accuracy_testing/sql_templates"
#   output_directory: "data/sql_extracts"
# processing:
#   batch_size: 900
#   transaction_column: "Transaction Ref"
#
# Result:
#   - Reads validated_FY25_Q3_7_37.csv  → Generates 7_37_FY25_Q3.sql
#   - Reads validated_FY25_Q3_16_21.csv → Generates 16_21_FY25_Q3.sql
#   - Reads validated_FY25_Q3_35_3.csv  → Generates 35_3_FY25_Q3.sql
#
# Example 2: Large dataset with multiple extracts
# -----------------------------------------------
# If validated_FY25_Q3_7_37.csv contains 2000 transaction refs:
#   - Generates 7_37_FY25_Q3_Extract1.sql (900 refs)
#   - Generates 7_37_FY25_Q3_Extract2.sql (900 refs)
#   - Generates 7_37_FY25_Q3_Extract3.sql (200 refs)
#
# Example 3: Single mode (legacy)
# -------------------------------
# paths:
#   template_file: "src/accuracy_testing/sql_templates/BuyerID.sql"
#   input_file: "data/custom_transactions.csv"
#   output_directory: "data/output"
# processing:
#   batch_size: 500
#
# CLI Usage:
# ----------
# Batch mode:  generate-sql-extract --config config.yaml
# Dry run:     generate-sql-extract --config config.yaml --dry-run
# Verbose:     generate-sql-extract --config config.yaml --verbose

  template_dir: "legacy/sql"
  
  # Default output directory
  output_dir: "data/output/sql"
  
  # Placeholder formats (for auto-detection)
  placeholder_formats:
    - "--<<TRANSACTION REFERENCES>>"
    - "--<TRADE REFERENCES>--"
  
  # Input CSV settings
  input:
    header_row: true
    reference_column: 0  # First column (0-indexed)
    encoding: "utf-8"
  
  # Output settings
  output:
    encoding: "utf-8"
    overwrite: true
    create_directories: true

# Template Mappings (examples for different use cases)
templates:
  buyer_id_extract:
    template: "legacy/sql/ExtractBuyerID.sql"
    description: "Extract buyer ID validation data"
    incident_code: "35_3"
    
  seller_id_extract:
    template: "legacy/sql/ExtractSellerID.sql"
    description: "Extract seller ID validation data"
    incident_code: "35_4"
    
  inconsistent_buyer_extract:
    template: "legacy/sql/ExtractInconsistentBuyerID.sql"
    description: "Extract inconsistent buyer ID validation data"
    incident_code: "35_3"
    
  pricing_extract:
    template: "legacy/sql/PricingDataExtract.sql"
    description: "Extract pricing validation data"
    incident_code: "35_3"
