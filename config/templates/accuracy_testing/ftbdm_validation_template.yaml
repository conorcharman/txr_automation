# Fund Trade Buyer Decision Maker Validation Configuration Template
# ===================================================================
#
# Validates buyer decision maker identification codes.
# Script: validate_ftbdm.py
# Incident: 12_17 (Incorrect ID of Buyer Decision Maker)
#
# Usage:
#   python -m src.accuracy_testing.scripts.validate_ftbdm \
#       --config config/local/accuracy_testing/ftbdm_validation.yaml

# =============================================================================
# Configuration Mode
# =============================================================================
# Options: "single" only (no batch mode for decision maker validation)
# Decision maker validation requires one extract file per execution
mode: "single"

# =============================================================================
# Testing Period
# =============================================================================
testing_period:
  # Fiscal year (e.g., FY25, FY26)
  fiscal_year: "FY25"
  
  # Quarter (e.g., Q1, Q2, Q3, Q4)
  quarter: "Q4"

# =============================================================================
# Single Mode Configuration
# =============================================================================
# Process one incident with explicit file paths
single:
  # Incident code (must be 12_17)
  incident_code: "12_17"
  
  paths:
    # Extract file (SQL database export) - validation input
    # Example: 12_17_FY26_Q1.csv
    input_file: 'C:\Users\ccharm\Desktop\Data\txr_automated_accuracy_testing\accuracy_testing\2025\Q4\extracts\csv\12_17_FY25_Q4.csv'
    
    # Template file (Kaizen expected values) - validation reference
    # Example: FY26 Q1 12_17.csv
    template_file: 'C:\Users\ccharm\Desktop\Data\txr_automated_accuracy_testing\accuracy_testing\2025\Q4\incident_code_analysis\FY25 Q4 12_17.csv'
    
    # Output file (validation results)
    # Example: validated_FY26_Q1_12_17.csv
    output_file: 'C:\Users\ccharm\Desktop\Data\txr_automated_accuracy_testing\accuracy_testing\2025\Q4\validated\validated_FY25_Q4_12_17.csv'
    
    # LEI reference data file (Branch Code -> LEI mapping)
    # Required columns: Branch Code, LEI
    lei_data_file: 'c:\Users\ccharm\Desktop\Data\txr_automated_accuracy_testing\reference\lei_reference.csv'
    
    # Log output directory
    log_output: "logs"

# =============================================================================
# Options
# =============================================================================
options:
  # Dry run mode - preview validation without writing output files
  dry_run: false
  
  # Show progress bars during processing
  show_progress: true

# =============================================================================
# Processor Configuration
# =============================================================================
processor:
  # Logging level: DEBUG, INFO, WARNING, ERROR
  log_level: "INFO"
  
  # Enable verbose console output
  verbose: false

# =============================================================================
# Validation Rules
# =============================================================================
validation:
  # Account types exempt from validation (never validate DM for these)
  exempt_account_types:
    - "SIPP"
  
  # Service levels that require validation (only these need DM validation)
  discretionary_service_levels:
    - "D"

# =============================================================================
# Required Input Columns
# =============================================================================
# The extract file MUST contain these columns:
#   - Transaction Reference
#   - Account ID
#   - Buyer ID Code
#   - Type of Buyer ID Code
#   - Buyer DM ID Code
#   - Type of Buyer DM ID Code
#   - Product               (derived from Account ID prefix)
#   - Account Type
#   - Service Level
#   - Branch Code           (used for LEI lookup)
#
# Output columns added:
#   - Error                (Y/N)
#   - Correction           (LEI value, if needed)
#   - Correction Field     (Field name, e.g., "Buyer DM ID Code")

# =============================================================================
# Validation Logic
# =============================================================================
# 1. SIPP accounts: Always no error (exempt from DM validation)
# 2. Non-discretionary (Service Level != "D"): Always no error
# 3. Discretionary accounts:
#    a. DM Code empty → Error, provide LEI correction
#    b. DM Code = Buyer ID Code → Error, provide correct LEI
#    c. DM Code different from Buyer ID Code → No error
# 4. If Branch Code not found in LEI data → TBC - Investigate branch code
# 5. If Branch Code found but LEI empty → TBC - Investigate LEI
#
# Correction format: "{LEI}:L"
# Example: "549300FUNDMANAGER0001:L"

# =============================================================================
# LEI Data File Format
# =============================================================================
# The LEI data file should have the following format:
#
# Branch Code,LEI
# ABC001,549300FUNDMANAGER0001
# XYZ002,549300FUNDMANAGER0002
# DEF003,549300MANAGER00000003
#
# Notes:
# - Branch Code: Internal branch or partner identifier
# - LEI: 20-character Legal Entity Identifier
# - First row is header (will be skipped)
