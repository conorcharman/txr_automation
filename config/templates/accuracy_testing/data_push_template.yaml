# Data Push Configuration Template
# ==================================
#
# Pushes validated data to Kaizen master tracking files.
# Script: data_push.py
# Supports ALL 11 automated incidents
#
# Usage:
#   python -m src.accuracy_testing.scripts.data_push \
#       --config config/local/accuracy_testing/data_push.yaml

# =============================================================================
# Configuration Mode
# =============================================================================
# Options: "single" or "batch"
# - single: Push one incident with explicit file paths
# - batch:  Push multiple incidents using filename patterns
mode: "batch"

# =============================================================================
# Testing Period
# =============================================================================
testing_period:
  # Fiscal year (e.g., FY25, FY26)
  fiscal_year: "FY26"
  
  # Quarter (e.g., Q1, Q2, Q3, Q4)
  quarter: "Q1"

# =============================================================================
# Single Mode Configuration
# =============================================================================
# Used when mode: "single"
# Push one incident with explicit file paths
single:
  # Incident code to process
  incident_code: "7_37"
  
  paths:
    # Source file (validated data) - data to push
    # Example: validated_FY26_Q1_7_37.csv
    source_file: "data/validated/validated_FY26_Q1_7_37.csv"
    
    # Target file (Kaizen master template) - file to update
    # Example: FY26 Q1 7_37.csv
    target_file: "data/templates/FY26 Q1 7_37.csv"
    
    # Backup directory (optional)
    # Original target file backed up before modification
    backup_dir: "data/backups/FY26/Q1"
    
    # Log output directory
    log_output: "logs"
  
  # Column mappings (source → target)
  column_mappings:
    - source: "Correction"
      target: "Correction"
    - source: "Error Flag"
      target: "Error Flag"

# =============================================================================
# Batch Mode Configuration
# =============================================================================
# Used when mode: "batch"
# Process multiple incidents automatically
batch:
  # Incidents to process
  # Options:
  #   - "all": Process ALL 11 automated incidents
  #   - List: ["7_35", "7_37", "7_39", "7_66", "12_17", "16_19", "16_21", "16_23", "16_20", "21_17", "35_3"]
  incidents: "all"
  
  paths:
    # Directory containing source files (validated data)
    source_dir: "data/validated/FY26/Q1"
    
    # Directory containing target files (Kaizen master templates)
    target_dir: "data/templates/FY26/Q1"
    
    # Backup directory (optional)
    # Original target files backed up before modification
    backup_dir: "data/backups/FY26/Q1"
    
    # Log output directory
    log_output: "logs"
  
  # Filename patterns - construct filenames for each incident
  # Available variables: {incident}, {fiscal_year}, {quarter}
  filename_patterns:
    # Source file (validated data) - data to push
    # Multiple patterns tried in order (first match wins)
    source:
      # Primary pattern (new naming convention)
      - "validated_{fiscal_year}_{quarter}_{incident}.csv"
      # Legacy pattern 1
      - "{fiscal_year} {quarter} - {incident}.csv"
      # Legacy pattern 2
      - "{incident}_validated.csv"
    
    # Target file (Kaizen master template) - file to update
    # Example: FY26 Q1 7_37.csv
    target: "{fiscal_year} {quarter} {incident}.csv"
    
    # Backup file (timestamped backup of target)
    # Example: FY26_Q1_7_37_backup_20260128_143022.csv
    backup: "{fiscal_year}_{quarter}_{incident}_backup_{timestamp}.csv"
  
  # Column mappings (source → target)
  # Applied to all incidents
  column_mappings:
    - source: "Correction"
      target: "Correction"
    - source: "Error Flag"
      target: "Error Flag"

# =============================================================================
# Push Logic
# =============================================================================
push_logic:
  # Match column - used to join source and target files
  match_column: "Transaction Reference"
  
  # Error flag column in source file
  error_flag_column: "Error Flag"
  
  # Push rules based on error flag value
  rules:
    # If error flag = "Y", push all mapped columns
    error_yes:
      flag_value: "Y"
      push_columns: "all"
    
    # If error flag = "N", push error flag only
    error_no:
      flag_value: "N"
      push_columns: ["Error Flag"]
    
    # If error flag = "TBC", skip (no push)
    error_tbc:
      flag_value: "TBC"
      push_columns: []

# =============================================================================
# Options
# =============================================================================
options:
  # Dry run mode - preview push without modifying files
  dry_run: false
  
  # Create backups before modifying target files
  create_backups: true
  
  # Show progress bars during processing
  show_progress: true
  
  # Overwrite existing columns in target file
  overwrite: true
  
  # Case-sensitive column name matching
  case_sensitive: false

# =============================================================================
# Processor Configuration
# =============================================================================
processor:
  # Logging level: DEBUG, INFO, WARNING, ERROR
  log_level: "INFO"
  
  # Enable verbose console output
  verbose: false

# =============================================================================
# Supported Incident Codes (ALL 11)
# =============================================================================
# This script pushes validated data for ALL automated incidents:
#   - 7_35:  Incorrect CONCAT value within Buyer identification code field
#   - 7_37:  Incorrect NIDN value within Buyer identification code field
#   - 7_39:  Incorrect CCPT value within Buyer identification code field
#   - 7_66:  Inconsistent Buyer Identification Codes
#   - 12_17: Incorrect ID of Buyer Decision Maker
#   - 16_19: Incorrect CONCAT value within Seller identification code field
#   - 16_21: Incorrect NIDN value within Seller identification code field
#   - 16_23: Incorrect CCPT value within Seller identification code field
#   - 16_20: Inconsistent Seller Identification Codes
#   - 21_17: Incorrect ID of Seller Decision Maker
#   - 35_3:  Incorrect Value Compensation for Trading Positions (Pricing)
#
# Note: Data push supports ALL incidents in batch mode because it uses a generic
# push algorithm (match by transaction reference, push based on error flag).

# =============================================================================
# Example Workflow
# =============================================================================
# 1. SQL Extract Generator → Generates extract files (7_37_FY26_Q1.csv)
# 2. Validation Script     → Validates data (validated_FY26_Q1_7_37.csv)
# 3. Data Push             → Updates master templates (FY26 Q1 7_37.csv)
#
# The updated master template can then be uploaded to Kaizen.