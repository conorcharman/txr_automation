# Data Push Configuration Template
# ==================================
#
# Configuration for pushing validation results to master tracking files.
#
# This script consolidates accuracy testing results back to centralised
# tracking files after validation is complete.
#
# Usage:
#   1. Copy this template to config/local/accuracy_testing/
#   2. Update paths to match your environment
#   3. Run: python -m src.accuracy_testing.scripts.data_push --config <path>
#
# Single file mode:
#   python -m src.accuracy_testing.scripts.data_push --config data_push.yaml
#
# Batch mode (multiple incidents):
#   python -m src.accuracy_testing.scripts.data_push --batch \
#       --source-dir data/output/validated \
#       --target-dir data/master \
#       --fiscal-year FY26 --quarter Q1

# =============================================================================
# Testing Period
# =============================================================================
testing_period:
  # Fiscal year (e.g., FY25, FY26)
  fiscal_year: "FY26"
  
  # Quarter (e.g., Q1, Q2, Q3, Q4)
  quarter: "Q1"

# =============================================================================
# Incident Information
# =============================================================================
incident:
  # Incident code (e.g., 7_35, 7_37, 12_17)
  code: "7_37"
  
  # Description for logging
  description: "Buyer ID Validation Results"

# =============================================================================
# File Paths
# =============================================================================
paths:
  # Source CSV file (validation output)
  # This is the output from a validation script (buyer_id, seller_id, etc.)
  source_file: "data/output/accuracy_testing/validated/FY26 Q1 - 7_37.csv"
  
  # Target CSV file (master tracking file)
  # This is the centralised tracking file to update
  target_file: "data/master/FY26/Q1/FY26 Q1 - 7_37.csv"
  
  # Output CSV file (optional)
  # If not specified, target_file is updated in place
  # output_file: "data/output/pushed/FY26 Q1 - 7_37.csv"
  
  # Log output directory
  log_output: "logs"

# =============================================================================
# Column Configuration
# =============================================================================
columns:
  # Transaction reference column name (used for matching)
  transaction_ref: "Transaction Reference"
  
  # Error column name (determines push action)
  error: "Error"

# =============================================================================
# Column Mappings
# =============================================================================
# Define how source columns map to target columns.
# - source: Column name in source file (validation output)
# - target: Column name in target file (master tracking)
# - description: Human-readable description
#
# Push Logic:
#   - If Error = "Y": Push ALL mapped columns
#   - If Error = "N": Only push "N" to error column
#   - If Error = "TBC" or other: Skip (no push)
#
# Note: These mappings are for BUYER/SELLER validation outputs.
# For PRICING validation, use pricing_column_mappings below.

column_mappings:
  # Identity columns
  - source: "Account ID"
    target: "Account ID"
    description: "Client account identifier"
    
  - source: "Person Code"
    target: "Person Code"
    description: "Person code identifier"
    
  - source: "Account Type"
    target: "Account Type"
    description: "Account type classification"
  
  # ID validation columns (use Buyer or Seller variant)
  - source: "Buyer ID Code"
    target: "Buyer ID Code"
    description: "Buyer identification code"
    
  - source: "Type of Buyer ID Code"
    target: "Type of Buyer ID Code"
    description: "Type of buyer identification (NIDN, CONCAT, etc.)"
    
  # Personal details
  - source: "First Name"
    target: "First Name"
    description: "Client first name"
    
  - source: "Surname"
    target: "Surname"
    description: "Client surname"
    
  - source: "Date of Birth"
    target: "Date of Birth"
    description: "Client date of birth"
    
  - source: "Gender"
    target: "Gender"
    description: "Client gender"
    
  - source: "Primary Nationality"
    target: "Primary Nationality"
    description: "Primary nationality code"
    
  - source: "Secondary Nationality"
    target: "Secondary Nationality"
    description: "Secondary nationality code"
    
  # Correction columns
  - source: "Correction Output"
    target: "Correction Output"
    description: "Suggested correction value (ID:TYPE format)"
    
  - source: "Correction Fields"
    target: "Correction Fields"
    description: "Fields being corrected (ID:IDT format)"
    
  # Status columns
  - source: "Tracker Status"
    target: "Tracker Status"
    description: "Status from tracker system"
    
  - source: "Pass/Fail"
    target: "Pass/Fail"
    description: "Format and logic validation result"
    
  - source: "Failure Reason"
    target: "Failure Reason"
    description: "Specific reason for validation failure"
    
  - source: "Actions Taken"
    target: "Actions Taken"
    description: "Actions taken on this record"
    
  # Error/Match columns
  - source: "Error"
    target: "Error"
    description: "Validation error flag (Y/N)"
    
  - source: "Kaizen Error"
    target: "Kaizen Error"
    description: "Template lookup result (ID:TYPE)"
    
  - source: "Match"
    target: "Match"
    description: "Match result (TRUE/FALSE)"

# =============================================================================
# Alternative: Seller ID Column Mappings
# =============================================================================
# If pushing seller validation results, replace the ID columns above with:
#
# seller_column_mappings:
#   - source: "Seller ID Code"
#     target: "Seller ID Code"
#     description: "Seller identification code"
#     
#   - source: "Type of Seller ID Code"
#     target: "Type of Seller ID Code"
#     description: "Type of seller identification (NIDN, CONCAT, etc.)"

