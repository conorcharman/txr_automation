#     
#   - source: "Correction Field"
#     target: "Correction Field"
#     description: "Field being corrected"
#     
#   - source: "Error"
#     target: "Error"
#     description: "Validation error flag (Y/N)"

# =============================================================================
# Options
# =============================================================================
options:
  # Dry run mode - preview changes without writing to files
  dry_run: false
  
  # Create backup of target file before modifying
  # Backup files are named: {filename}.backup_{timestamp}.csv
  backup: true

# =============================================================================
# Processor Configuration
# =============================================================================
processor:
  # Logging level: DEBUG, INFO, WARNING, ERROR
  log_level: "INFO"
  
  # Enable verbose console output
  verbose: false

# =============================================================================
# Batch Mode Configuration
# =============================================================================
# For batch mode, use CLI arguments instead:
#
#   python -m src.accuracy_testing.scripts.data_push --batch \
#       --source-dir data/output/validated \
#       --target-dir data/master/FY26/Q1 \
#       --fiscal-year FY26 \
#       --quarter Q1 \
#       --incidents 7_35,7_37,7_39
#
# If --incidents is not specified, all matching files are discovered automatically.

# =============================================================================
# Sample Source Data Format (Buyer/Seller Validation Output)
# =============================================================================
# The source CSV is the output from buyer_id_validation.py or seller_id_validation.py:
#
# Transaction Reference,Account ID,Person Code,Account Type,Buyer ID Code,Type of Buyer ID Code,First Name,Surname,Date of Birth,Gender,Primary Nationality,Secondary Nationality,Correction Output,Correction Fields,Tracker Status,Pass/Fail,Failure Reason,Actions Taken,Error,Kaizen Error,Match
# TXN001,A12345678,PC001,APTS,549300CLIENT001,LEI,John,Smith,1990-01-15,M,GB,,549300CORRECT001:LEI,ID:IDT,Resolved,FAIL,Invalid LEI checksum,,Y,549300CORRECT001:LEI,FALSE
# TXN002,B98765432,PC002,AETS,AB123456C,NIDN,Jane,Doe,1985-06-20,F,GB,,,,Resolved,PASS,,,N,,TRUE
# TXN003,X11111111,PC003,APTS,,,,,,,,549300MANAGER001:LEI,ID:IDT,,FAIL,Missing ID,,Y,549300MANAGER001:LEI,FALSE
#
# Error column values:
#   Y   - Error detected, push all columns
#   N   - No error, only push "N" to error column  
#   TBC - Needs investigation, skip (don't push)

# =============================================================================
# Sample Target Data Format (Master Tracking File)
# =============================================================================
# The target CSV is the master tracking file (template generator output):
#
# Transaction Reference,Account ID,Person Code,Account Type,Buyer ID Code,Type of Buyer ID Code,...,Error,Kaizen Error,Match,Agree With Correction,Suggested Correction,...
# TXN001,,,,,,...,,,,,,...
# TXN002,,,,,,...,,,,,,...
# TXN003,,,,,,...,,,,,,...
#
# Notes:
# - Only rows with matching Transaction Reference are updated
# - Extra columns not in mappings are preserved
# - Unmatched source records are logged as "not found"
# - Unmatched target records are left unchanged
