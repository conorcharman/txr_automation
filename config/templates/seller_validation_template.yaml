# Seller ID Validation Configuration
# ==================================

# File paths
paths:
  # Input CSV file with seller ID data
  input_file: "data/test/seller_id_sample.csv"
  
  # Output CSV file with validation results
  output_file: "data/test/seller_id_output.csv"
  
  # Log output directory
  log_output: "logs"

# Processor configuration
processor:
  # Logging level: DEBUG, INFO, WARNING, ERROR
  log_level: "INFO"
  
  # Enable verbose console output
  verbose: false
  
  # Batch size for processing (future use)
  batch_size: 1000
