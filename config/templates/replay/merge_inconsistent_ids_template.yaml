# Merge Inconsistent Summaries - Configuration Template
# =======================================================
#
# Used by: merge-inconsistent-summaries
# Script:  src/replay/merge_inconsistent_ids.py
#
# Usage:
#   merge-inconsistent-summaries --config path/to/this_config.yaml
#   merge-inconsistent-summaries --input-dir path/to/phase_iii/output

paths:
  # Phase 3 Processor output directory (Feedback stage).
  # Contains the Inconsistent IDs and Names Summary CSV files produced by
  # phase_3_processor.py. Merged .xlsx files are written to this same directory.
  input_dir: "/path/to/data/FY26/Q1/replay/phase_3/feedback"

files:
  # Glob patterns used to locate the two summary CSV files within input_dir.
  # Adjust if your filenames use a different convention.
  ids_pattern:   "Replay_*_Inconsistent_IDs_Summary_*.csv"
  names_pattern: "Replay_*_Inconsistent_Names_Summary_*.csv"

merge:
  # Column name to group/merge rows on for each file.
  # Rows with the same value in this column are merged into one output row.
  ids_group_column:   "Reported Name & DOB"
  names_group_column: "Reported ID"

  # Separator used between stacked values within a merged cell (default: newline).
  # Change to "|" if you prefer pipe-separated values in a single line.
  separator: "\n"

options:
  dry_run: false
  verbose: false

processor:
  log_level: "INFO"
