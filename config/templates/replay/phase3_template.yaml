# Configuration for Phase 3 Processor
# All sections are REQUIRED - no default values are provided
# Copy this file and modify paths and patterns as needed

paths:
  # Input: analyst-prepared Phase III Inconsistent IDs/Names Summary CSVs.
  # Place files matching the replay_patterns below into this directory.
  replay_input: "/path/to/data/FY26/Q1/replay/shared/extracts"

  # Incident code reference files — point to the accuracy_testing templates
  # directory, which is the single source of truth for incident template CSVs
  # (e.g. "FY26 Q1 7_66.csv"). No separate replay/templates folder is needed.
  incident_files: "/path/to/data/FY26/Q1/accuracy_testing/templates"

  # Output directory for Phase III processed replay files (Feedback stage).
  replay_output: "/path/to/data/FY26/Q1/replay/phase_3/feedback"

  # Log output directory.
  log_output: "/path/to/data/FY26/Q1/replay/phase_3/logs"

files:
  # REQUIRED: Replay file patterns (glob syntax supported)
  # Supports both .csv and .xlsx formats
  replay_patterns:
    - "Replay_*_PHASE 3_Inconsistent_IDs_Summary_FINAL.*"
    - "Replay_*_PHASE 3_Inconsistent_Names_Summary_FINAL.*"
  
  # REQUIRED: Incident file pattern (e.g., "FY25 Q4 *.csv")
  # Primary: space-separated (FY25 Q4 7_39.csv)
  # Fallback: dash-separated for backwards compatibility (FY25 Q4 - 7_39.csv)
  incident_pattern: "FY25 Q4 *.csv"

# REQUIRED: Incident template column mappings
# These define which columns to read from incident template files
# Column names must match exactly what's in your incident CSV headers
#
# CORRECTION DECISION LOGIC (v2.0):
# 1. If "Correction" column has a value:
#    - If "Agree With Correction" is Y/P/empty: Apply Correction + Correction Field
#    - If "Agree With Correction" is N/F: Apply Suggested Correction (if exists), else No Change
# 2. If "Correction" column is empty:
#    - Apply Suggested Correction (if exists), else No Change
incident_columns:
  # Correction data columns (used to extract correction information)
  transaction_ref: "Transaction Reference"
  error_flag: "Error"  # DEPRECATED - no longer used in decision logic
  correction: "Correction"
  correction_field: "Correction Field"
  agree_with_correction: "Agree With Correction"
  suggested_correction: "Suggested Correction"
  suggested_correction_field: "Suggested Correction Field"
  
  # Data columns for matching (used to find records in incident files)
  # Buyer matching columns
  buyer_id: "Buyer identification code"
  buyer_first_name: "Buyer - First name(s)"
  buyer_last_name: "Buyer - Surname(s)"
  buyer_dob: "Buyer - Date of birth"
  
  # Seller matching columns
  seller_id: "Seller identification code"
  seller_first_name: "Seller - First name(s)"
  seller_last_name: "Seller - Surname(s)"
  seller_dob: "Seller - Date of birth"
  
  # Decision Maker columns (optional, for fallback matching)
  buyer_dm_id: "Buyer decision maker code"
  buyer_dm_first_name: "Buy decision maker - First name(s)"
  buyer_dm_last_name: "Buy decision maker - Surname(s)"
  buyer_dm_dob: "Buy decision maker - Date of birth"
  seller_dm_id: "Seller decision maker code"
  seller_dm_first_name: "Sell decision maker - First name(s)"
  seller_dm_last_name: "Sell decision maker - Surname(s)"
  seller_dm_dob: "Sell decision maker - Date of birth"

processor:
  # REQUIRED: Batch size for progress reporting
  batch_size: 100
  
  # Log level (DEBUG, INFO, WARNING, ERROR)
  log_level: "INFO"
  
  # Optional: Similarity threshold for fuzzy name matching (0.0 - 1.0)
  # Default: 0.85 if not specified
  similarity_threshold: 0.85
  
  # Optional: Output filename pattern replacement
  # If specified, both 'from' and 'to' are required
  # Example: replaces "_FINAL" with "_AJB" in output filenames
  replace_pattern:
    from: "_FINAL"
    to: "_AJB"