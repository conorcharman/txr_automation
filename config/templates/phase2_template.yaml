# Example YAML configuration for Phase 2 Processor
# Copy this file and modify paths as needed

paths:
  # Input replay files (CSV format)
  replay_input: "/Users/conorcharman/Documents/GitHub/txr_automation/data/sample/phase_ii"
  
  # Incident code reference files (CSV format)
  incident_files: "/Users/conorcharman/Documents/GitHub/txr_automation/data/sample/incident_code_files"
  
  # Output directory for processed replay files
  replay_output: "/Users/conorcharman/Documents/GitHub/txr_automation/data/output/phase_ii"
  
  # Log output directory
  log_output: "/Users/conorcharman/Documents/GitHub/txr_automation/data/output/logs"

files:
  # Replay file patterns (glob syntax supported)
  replay_patterns:
    - "*.csv"
  
  # Incident file pattern
  incident_pattern: "FY25 Q3 - *.csv"

processor:
  # Batch size for progress reporting
  batch_size: 50
  
  # Log level (DEBUG, INFO, WARNING, ERROR)
  log_level: "INFO"
  
  # Output filename pattern (e.g., replace KR with AJB)
  replace_pattern:
    from: "KR"
    to: "AJB"

