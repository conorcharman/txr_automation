# XLSX to CSV Converter Configuration Template
# Copy this file to config/local/utils/xlsx_converter.yaml and customize

# Conversion mode selection
# Mode 1: Recursive parent directory mode (xlsx → csv in same structure)
# Mode 2: Single directory mode (input dir → output dir)
mode: 1

# Mode 1 paths - Recursive parent directory mode
# Use this when you have a structured hierarchy with xlsx/csv folders
mode1_paths:
  parent_dir: 'C:\Users\ccharm\Desktop\Data\txr_replay_automation\phase_iii_final_lookup\FY25\Q4'
  log_output: C:/Users/YOUR_USERNAME/Desktop/Data/txr_replay_automation/logs

# Mode 2 paths - Single directory mode (original behavior)
# Use this for simple input → output conversion
mode2_paths:
  input_dir: C:\Users\ccharm\Desktop\Data\txr_automated_accuracy_testing
  output_dir: C:\Users\ccharm\Desktop\Data\txr_automated_accuracy_testing
  log_output: C:\Users\ccharm\Desktop\Data\txr_automated_accuracy_testing\logs

processing:
  # Enable recursive scanning of subdirectories
  recursive: true
  
  # Encoding for CSV output files (utf-8-sig adds BOM for Excel)
  encoding: utf-8-sig
  
  # Whether to split multi-line cells into separate rows
  split_multiline: true
  
  # Dry run mode - preview what would be converted without actually converting
  dry_run: false
  
  # Force overwrite existing CSV files without prompting
  force: false

# Optional filters (only applies in parent_dir mode)
filters:
  # Filter by fiscal year (e.g., FY25, FY26)
  # fiscal_year: FY25
  
  # Filter by quarter (e.g., Q1, Q2, Q3, Q4)
  # quarter: Q3
  
  # Filter by specific phases (list of phase names)
  # phases:
  #   - phase_ii
  #   - phase_iii
  #   - phase_iii_final_lookup
  #   - reference

logging:
  # Log level: DEBUG, INFO, WARNING, ERROR
  level: INFO
  
  # Enable structured logging
  structured: true

# =============================================================================
# Example Usage:
# =============================================================================
#
# 1. Convert all FY25 Q3 data across all phases (Mode 1):
#    Set mode: 1 in config, then run:
#    replay-xlsx-converter --config config/local/utils/xlsx_converter.yaml
#
# 2. Convert with command-line filters:
#    replay-xlsx-converter --parent-dir C:/Data/txr_replay_automation \
#                          --filter-year FY25 --filter-quarter Q3
#
# 3. Preview what would be converted (dry run):
#    replay-xlsx-converter --parent-dir C:/Data/txr_replay_automation --dry-run
#
# 4. Convert specific phases only:
#    replay-xlsx-converter --parent-dir C:/Data/txr_replay_automation \
#                          --filter-phase phase_ii phase_iii
#
# 5. Single directory mode (Mode 2):
#    Set mode: 2 in config, then run:
#    replay-xlsx-converter --config config/local/utils/xlsx_converter.yaml
#
# 6. Override mode via command line:
#    replay-xlsx-converter --mode 1 --parent-dir ./data/parent
#    replay-xlsx-converter --mode 2 --input-dir ./data/xlsx --output-dir ./data/csv
#
# =============================================================================
# Directory Structure Examples:
# =============================================================================
#
# Input structure:
#   txr_replay_automation/
#     ├── phase_ii/
#     │   └── FY25/
#     │       └── Q3/
#     │           └── reference/
#     │               └── xlsx/
#     │                   └── file.xlsx
#     └── reference/
#         └── FY25/
#             └── Q3/
#                 └── incident_code_files/
#                     └── xlsx/
#                         └── file.xlsx
#
# Output structure (xlsx → csv):
#   txr_replay_automation/
#     ├── phase_ii/
#     │   └── FY25/
#     │       └── Q3/
#     │           └── reference/
#     │               └── csv/        <- Created here
#     │                   └── file.csv
#     └── reference/
#         └── FY25/
#             └── Q3/
#                 └── incident_code_files/
#                     └── csv/        <- Created here
#                         └── file.csv
