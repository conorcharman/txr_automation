  # Incident code reference files (CSV format)
  incident_files: "C:\\Users\\ccharm\\Desktop\\Data\\txr_replay_automation\\reference\\FY25\\Q3\\incident_code_files\\csv"
  
  # Output directory for processed replay files
  replay_output: "C:\\Users\\ccharm\\Desktop\\Data\\txr_replay_automation\\phase_iii\\FY25\\Q3\\output"
  
