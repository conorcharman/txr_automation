services:

  # ---------------------------------------------------------------------------
  # Redis — Celery broker + WebSocket pub/sub
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - txr-network

  # ---------------------------------------------------------------------------
  # PostgreSQL — Job history, saved configs
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - txr-network

  # ---------------------------------------------------------------------------
  # API — FastAPI + Uvicorn (hot-reload in dev)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./api:/app/api
      - ./config:/app/config
      - ./data:/app/data
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db/${POSTGRES_DB}
      DATA_DIR: /app/data
    depends_on:
      - redis
      - db
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - txr-network

  # ---------------------------------------------------------------------------
  # Worker — Celery (same image as api)
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    volumes:
      - ./src:/app/src
      - ./api:/app/api
      - ./config:/app/config
      - ./data:/app/data
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db/${POSTGRES_DB}
      DATA_DIR: /app/data
    depends_on:
      - redis
      - db
    command: celery -A api.tasks.celery_app worker --loglevel=info --pool=solo
    networks:
      - txr-network

  # ---------------------------------------------------------------------------
  # Beat — Celery Beat scheduler (triggers periodic tasks e.g. check_and_run_schedules)
  # ---------------------------------------------------------------------------
  beat:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    volumes:
      - ./src:/app/src
      - ./api:/app/api
      - ./config:/app/config
      - ./data:/app/data
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db/${POSTGRES_DB}
      DATA_DIR: /app/data
    depends_on:
      - redis
      - db
    command: celery -A api.tasks.celery_app beat --loglevel=info --schedule /app/data/celerybeat-schedule
    networks:
      - txr-network

  # ---------------------------------------------------------------------------
  # Web — React SPA served by Nginx (proxies /api to backend)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - txr-network

networks:
  txr-network:
    driver: bridge

volumes:
  postgres_data:
